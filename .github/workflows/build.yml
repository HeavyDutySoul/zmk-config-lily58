on: [push, pull_request]

name: Build ZMK firmware

jobs:
  build:
    runs-on: ubuntu-latest
    name: Fetch Build Keyboards
    steps:
      # To use this repository's private action,
      # you must check out the repository
      - name: Checkout
        uses: actions/checkout@v2
      - name: Cache west modules
        uses: actions/cache@v2
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: West Init
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-init
        with:
          args: 'init "-l config"'
      - name: West Update
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-update
        with:
          args: 'update'
      - name: West Config Zephyr Base
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-config
        with:
          args: 'config "--global zephyr.base-prefer configfile"'
      - name: West Zephyr Export
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-zephyr-export
        with:
          args: 'zephyr-export'
      - name: West Build (Lily58 Left)
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-build-lily58-left
        with:
          args: 'build "--pristine -s zmk/app -b nrfmicro_13 -- -DSHIELD=lily58_left -DZMK_CONFIG=/github/workspace/config/lily58"'
      - name: Rename split (Lily58 Left)
        run: sudo mv build/zephyr/zmk.uf2 build/zephyr/zmk_lily58_left.uf2
      - name: Archive (Lily58 Left)
        uses: actions/upload-artifact@v2
        with:
          name: nrfmicro_lily58
          path: build/zephyr/zmk_lily58_left.uf2
      - name: West Build (Lily58 Right)
        uses: 'docker://zmkfirmware/zmk-build-arm:stable'
        id: west-build-lily58-right
        with:
          args: 'build "--pristine -s zmk/app -b nrfmicro_13 -- -DSHIELD=lily58_right -DZMK_CONFIG=/github/workspace/config/lily58"'
      - name: Rename split (Lily58 Right)
        run: sudo mv build/zephyr/zmk.uf2 build/zephyr/zmk_lily58_right.uf2
      - name: Archive (Lily58 Right)
        uses: actions/upload-artifact@v2
        with:
          name: nrfmicro_lily58
          path: build/zephyr/zmk_lily58_right.uf2
